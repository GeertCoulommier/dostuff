name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Backend tests ────────────────────────────────────────────
  backend-test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ── 2. Dependency audit ─────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-62 || true

  # ── 3. Docker build ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: dostuff-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: dostuff-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Integration smoke test ────────────────────────────────────
  integration-smoke:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 40); do
            DB_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q db)"     2>/dev/null || echo "starting")
            BE_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q backend)" 2>/dev/null || echo "starting")
            FE_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q frontend)" 2>/dev/null || echo "starting")
            echo "Attempt $i — db: $DB_HEALTH  backend: $BE_HEALTH  frontend: $FE_HEALTH"
            if [ "$DB_HEALTH" = "healthy" ] && [ "$BE_HEALTH" = "healthy" ] && [ "$FE_HEALTH" = "healthy" ]; then
              echo "All services healthy!"
              break
            fi
            sleep 5
          done
          if [ "$DB_HEALTH" != "healthy" ] || [ "$BE_HEALTH" != "healthy" ] || [ "$FE_HEALTH" != "healthy" ]; then
            echo "Services did not become healthy in time"
            docker compose logs
            exit 1
          fi

      - name: Test health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost/api/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"status":"ok"'

      - name: Test list tasks (empty)
        run: |
          RESPONSE=$(curl -sf http://localhost/api/tasks)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '\[\]'

      - name: Test create task
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"Smoke test task","priority":"high","deadline":"2030-01-01"}')
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"title":"Smoke test task"'
          echo "$RESPONSE" | grep '"priority":"high"'

      - name: Test invalid task returns 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"x","priority":"invalid"}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ]

      - name: Test frontend serves dostuff HTML
        run: |
          RESPONSE=$(curl -sf http://localhost/)
          echo "$RESPONSE" | grep -i "dostuff"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down --rmi all --volumes
